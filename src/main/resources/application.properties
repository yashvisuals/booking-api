spring.application.name=booking
server.port=8123

# H2 file-based database (persists across restarts; swap to MySQL later)
spring.datasource.url=jdbc:h2:file:./data/booking;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 web console at http://localhost:8123/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT (use a long random secret; min 32 chars for HS256)
app.jwt.secret=change-me-to-a-long-random-secret-at-least-32-chars
app.jwt.expiration-ms=86400000
