spring.application.name=booking
# Render injects PORT; default to 8123 locally.
server.port=${PORT:8123}

# Database — defaults to a local H2 file; override with env vars in the cloud.
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/booking;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Skip the slow JDBC-metadata round-trip on boot. Dialect is set explicitly via
# DB_DIALECT (H2 locally, MySQL in prod) so Hibernate doesn't need to inspect it.
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
# Don't fail startup if Hikari can't immediately open a connection.
spring.datasource.hikari.initialization-fail-timeout=-1
# Pool tuning for high-latency Aiven<->Render link. Keep one warm connection
# always available so the first request after idle doesn't pay reconnect cost.
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.max-lifetime=1800000

# H2 web console (local only; harmless if unused)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
app.jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Allowed browser origins (comma-separated). Set to your frontend URL in the cloud.
app.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}
